<div class="container mt-3 wa-page">

    <div class="wa-header">
        <div>
            <h4 class="mb-0">Mensagens do WhatsApp</h4>
        </div>

        <div class="wa-actions">
            <button class="btn btn-outline-secondary" (click)="goBack()">
                Voltar para detalhes
            </button>
        </div>
    </div>

    <div class="card shadow-sm mb-3">
        <div class="card-body">

            <div class="row g-2 align-items-end">
                <div class="col-sm-4">
                    <label class="form-label">Dia</label>
                    <input class="form-control" type="date" [value]="day"
                        (change)="onChangeDay(($any($event.target)).value)" />
                </div>
            </div>

        </div>
    </div>

    <div *ngIf="error" class="alert alert-danger">
        {{ error }}
    </div>

    <div *ngIf="loading" class="text-center py-3">
        <div class="spinner-border"></div>
    </div>

    <div *ngIf="!loading && items.length === 0" class="alert alert-warning">
        Nenhuma mensagem encontrada para este dia.
    </div>

    <div *ngIf="items.length > 0" class="card shadow-sm">
        <div class="card-body">

            <div class="table-responsive">
                <table class="table table-sm align-middle">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>WhatsApp</th>
                            <th>Direção</th>
                            <th>Status</th>
                            <th>Texto</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr *ngFor="let m of items">
                            <td><span class="text-muted">{{ m.createdAt | date:'dd/MM/yyyy HH:mm:ss' }}</span></td>
                            <td><span class="text-muted">{{ m.fromUser }}</span></td>
                            <td>
                                <span [class]="m.direction === 'inbound' ? 'badge bg-secondary' : 'badge bg-success'">
                                    {{ getDirectionDescription(m.direction) }}
                                </span>
                            </td>
                            <td>{{ getStatusDescription(m.status) }}</td>
                            <td class="wa-text">
                                <div class="wa-bubble"
                                    [ngClass]="m.direction === 'inbound' ? 'wa-bubble-in' : 'wa-bubble-out'">
                                    <div class="wa-bubble-body">
                                        {{ m.textBody }}
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-3">
                <button class="btn btn-outline-primary" (click)="loadMore()"
                    [disabled]="loading || !hasMore || !nextCursor">
                    Carregar mais
                </button>
            </div>

        </div>
    </div>

</div>
